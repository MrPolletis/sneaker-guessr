<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SneakerGuessr</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header">
        <div class="logo">SneakerGuessr</div>
        <div class="score-display">SCORE: <span id="score-val">0</span></div>
        <div class="settings" id="stats-btn" style="font-size: 28px;">🏆</div>
    </header>

    <main class="main">

        <div class="menu-container" id="menu-screen">
    <h1 class="menu-title">SneakerGuessr</h1>
    
    <button class="btn play-btn" id="play-btn">PLAY</button>
    <button class="btn secondary-btn" id="difficulty-btn">DIFFICULTY</button>
    <button class="btn secondary-btn" id="game-mode-btn">MODE: CLASSIC</button>
</div>

        <div id="game-screen" class="hidden">
            <div class="game-container">
                
                <div id="feedback-toast" class="feedback-banner hidden"></div>

                <div class="img-wrapper">
                    <img id="sneaker-img" src="" alt="Sneaker" class="sneaker-img">
                </div>
                
                <div id="feedback-details" class="feedback-correction hidden"></div>

                <div id="options-container" class="answers"></div>

                <div id="expert-mode-container" class="hidden">
                    <p id="expert-instruction" style="margin-bottom: 20px; font-size: 14px; color: #ff6a00; font-weight: 600; text-align: center; white-space: pre-line; line-height: 1.5;"></p>
                    <input type="text" id="sneaker-input" placeholder="Nombre del modelo...">
                    <button id="submit-guess" class="btn play-btn" style="margin-top: 20px; font-size: 16px; width: 100%;">ADIVINAR</button>
                </div>

                <button id="back-to-menu-btn" class="btn secondary-btn" style="margin-top: 25px; width: 100%; border-color: #333;">VOLVER AL MENÚ</button>
            </div>
        </div>

    </main>

    <div id="stats-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="close-stats-btn">&times;</span>
            <h2>🏆 MIS RÉCORDS</h2>
            <div class="stats-grid">
                <div class="stat-box full-width">
                    <span class="stat-label">PUNTOS TOTALES (DE SIEMPRE)</span>
                    <span class="stat-val" id="total-points-val">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Racha Classic</span>
                    <span class="stat-val" id="streak-classic-val">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Racha Expert (Normal)</span>
                    <span class="stat-val" id="streak-normal-val">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Racha Expert (Difícil)</span>
                    <span class="stat-val" id="streak-hard-val">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Racha Expert (Experto)</span>
                    <span class="stat-val" id="streak-expert-val">0</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
